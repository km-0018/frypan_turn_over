<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>フライパン返しDX</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;text-align:center}
#hud{padding:10px;background:#222}
canvas{display:block;margin:auto;background:#18222c;touch-action:none}
</style></head><body>
<div id="hud">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">45</span></div>
<div id="cook">🥩 生肉</div>
</div>
<canvas id="cv" width="400" height="600"></canvas>
<script>
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const meat=new Image();
meat.src='./meat.png';

let score=0,time=45,combo=1,cookLevel=0;
const names=['生肉','レア','ミディアム','ミディアムレア','ウェルダン','完成','焦げ','炭'];
let food={x:200,y:420,vy:0,flying:false};

function hud(){
 scoreEl.textContent=score;
 cook.textContent='🥩 '+names[cookLevel];
}
const scoreEl=document.getElementById('score');
const cook=document.getElementById('cook');

function drawMeat(x,y){
 if(meat.complete) ctx.drawImage(meat,x-32,y-32,64,64);
 const colors=[null,'rgba(255,200,100,.15)','rgba(180,120,60,.25)','rgba(140,80,40,.35)','rgba(90,50,20,.45)','rgba(60,30,10,.55)','rgba(30,20,20,.7)','rgba(0,0,0,.85)'];
 if(colors[cookLevel]){
   ctx.fillStyle=colors[cookLevel];
   ctx.fillRect(x-32,y-32,64,64);
 }
}

function draw(){
 ctx.clearRect(0,0,400,600);
 ctx.fillStyle='#444';
 ctx.beginPath();
 ctx.ellipse(200,460,90,25,0,0,Math.PI*2);
 ctx.fill();
 drawMeat(food.x,food.y);
}

function toss(){
 if(!food.flying){food.flying=true;food.vy=-14;}
}

function catchFood(){
 if(food.flying && food.vy>0){
   score+=100*combo;
   combo=Math.min(combo+1,10);
   if(cookLevel<7) cookLevel++;
   food.flying=false;
   food.y=420;
   food.vy=0;
   hud();
 }
}

cv.addEventListener('click',()=>food.flying?catchFood():toss());

function loop(){
 if(food.flying){
   food.y+=food.vy;
   food.vy+=0.6;
   if(food.y>420){
     food.y=420; food.vy=0; food.flying=false;
     combo=1;
     if(cookLevel>0) cookLevel--;
     hud();
   }
 }
 draw();
 requestAnimationFrame(loop);
}
hud(); loop();

setInterval(()=>{
 time--;
 document.getElementById('time').textContent=time;
},1000);
</script></body></html>
