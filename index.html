<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍳 ステーキ返し</title>
  <link rel="stylesheet" href="style.css"></style>

</head>
<body>
  <div id="app">

    <!-- TITLE -->
    <div class="screen active" id="screen-title">
      <div class="title-icon">🍳</div>
      <div class="title-text">ステーキ返し</div>
      <div class="title-sub">ボタンとスライダーで投げて受け止めよう！<br>45秒で何回連続キャッチできるか挑戦</div>

      <div class="how-grid">
        <div class="how-card">
          <div class="hico">🎚️</div>
          <div class="hbold">強さ調整</div>
          <div class="htxt">スライダーで投げる力をコントロール</div>
        </div>
        <div class="how-card">
          <div class="hico">🔄</div>
          <div class="hbold">角度調整</div>
          <div class="htxt">フライパンの傾きをスライダーで変える</div>
        </div>
        <div class="how-card">
          <div class="hico">🖱️</div>
          <div class="hbold">投げる</div>
          <div class="htxt">「投げる」ボタンでステーキを放り上げる</div>
        </div>
        <div class="how-card">
          <div class="hico">✋</div>
          <div class="hbold">キャッチ</div>
          <div class="htxt">キャッチボタンかタップで受け止めよう</div>
        </div>
      </div>

      <button class="btn-start" id="start-btn">はじめる 🍳</button>
    </div>

    <!-- GAME -->
    <div class="screen" id="screen-game">
      <div id="hud">
        <div class="hcard">
          <div class="hlabel">スコア</div>
          <div class="hval" id="hval-score" style="color:var(--yellow)">0</div>
        </div>
        <div class="hcard">
          <div class="hlabel">残り時間</div>
          <div class="hval" id="hval-time" style="color:var(--orange)">45</div>
        </div>
        <div class="hcard">
          <div class="hlabel">コンボ</div>
          <div class="hval" id="hval-combo" style="color:var(--cyan)">×1</div>
        </div>
      </div>

      <div id="cv-wrap">
        <canvas id="cv"></canvas>
        <div id="cd-ov"><div id="cd-num">3</div></div>
        <div id="combo-flash"></div>
        <div id="res-ov">
          <div class="res-emoji" id="res-emoji">🏆</div>
          <div class="res-label" id="res-label">神の手！</div>
          <div class="res-score" id="res-score">0点</div>
          <div class="res-detail" id="res-detail"></div>
          <button class="btn-retry" id="retry-btn">もう一回！</button>
        </div>
      </div>

      <div id="controls">
        <div class="control-row">
          <label for="strength-range">強さ <span id="strength-value">50%</span></label>
          <input type="range" id="strength-range" min="10" max="100" value="50">
        </div>
        <div class="control-row">
          <label for="angle-range">フライパン角度 <span id="angle-value">0°</span></label>
          <input type="range" id="angle-range" min="-25" max="25" value="0">
        </div>
        <div class="control-buttons">
          <button class="btn-action" id="toss-btn">投げる</button>
          <button class="btn-action" id="catch-btn">キャッチ</button>
        </div>
      </div>

      <div id="finish-wrap">
        <button class="btn-finish" id="finish-btn">✋ 終了する</button>
      </div>
    </div>

  </div>

  <script type="application/javascript" src="main.js"></script>
</body>
</html>
